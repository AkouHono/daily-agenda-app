name: daily_agenda_app
description: An intelligent daily agenda app with beautiful UI, notifications, and smart scheduling features.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  intl: ^0.19.0
  uuid: ^4.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^15.0.0
  timezone: ^0.9.2
  google_fonts: ^6.0.0
  flutter_animate: ^4.2.0
  lottie: ^2.7.0
  calendar_view: ^1.0.0
  table_calendar: ^3.0.9
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.65.0
  material_design_icons_flutter: ^7.0.7296

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
